<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>StandSync PiP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#0A0A0A;color:#FFFFFF;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;font-size:13px;overflow:hidden}
.hdr{padding:11px 14px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#0070F3,#3B9EFF);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{display:block}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;font-family:'JetBrains Mono',monospace}
.bar-wrap{height:2px;background:rgba(255,255,255,.06);flex-shrink:0}
.bar-fill{height:100%;background:linear-gradient(90deg,#0070F3,#3B9EFF,#34D399);transition:width .5s cubic-bezier(.22,1,.36,1)}
.tasks{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.tasks::-webkit-scrollbar{width:3px}
.tasks::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.task{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s;cursor:pointer}
.task:hover{background:rgba(255,255,255,.03)}
.cb{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .2s;position:relative;display:flex;align-items:center;justify-content:center}
.cb.done{border-color:#34D399;background:#34D399}
.cb.inprog{border-color:#3B9EFF;background:rgba(59,158,255,.15)}
.cb.blocked{border-color:#F87171;background:rgba(248,113,113,.15)}
.cb.done::after{content:'';display:block;width:6px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:12.5px;line-height:1.4;word-break:break-word;color:#F0F0F0}
.task-title.done{text-decoration:line-through;opacity:.38;color:rgba(255,255,255,.5)}
.task-meta{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-family:'JetBrains Mono',monospace}
.tag.critical{background:rgba(248,113,113,.15);color:#F87171;border:1px solid rgba(248,113,113,.25)}
.tag.high{background:rgba(249,115,22,.12);color:#FB923C;border:1px solid rgba(249,115,22,.2)}
.tag.medium{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.18)}
.tag.low{background:rgba(52,211,153,.1);color:#34D399;border:1px solid rgba(52,211,153,.18)}
.tag.deadline{background:rgba(59,158,255,.1);color:#3B9EFF;border:1px solid rgba(59,158,255,.18)}
.tag.status{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.1)}
.tag.label{color:#fff;border:1px solid transparent}
.tag.who{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}
.empty{padding:32px 16px;text-align:center;font-size:12px;color:rgba(255,255,255,.28);line-height:1.9}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.5}
.add-form{border-top:1px solid rgba(255,255,255,.07);padding:10px 12px 12px;flex-shrink:0}
.add-row{display:flex;gap:6px;margin-bottom:7px}
.add-row:last-child{margin-bottom:0}
input[type=text]{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:7px 11px;color:#fff;font-size:12.5px;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s}
input[type=text]:focus{border-color:rgba(0,112,243,.6);background:rgba(255,255,255,.07)}
input[type=text]::placeholder{color:rgba(255,255,255,.25)}
select{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:6px 8px;color:#fff;font-size:11.5px;outline:none;cursor:pointer;flex:1;min-width:0;font-family:'Inter',sans-serif;transition:border-color .15s}
select:focus{border-color:rgba(0,112,243,.5)}
select option{background:#111;color:#fff}
.send{width:33px;height:33px;border-radius:9px;background:linear-gradient(135deg,#0070F3,#3B9EFF);border:none;color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,112,243,.3);transition:all .15s}
.send:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,112,243,.4)}
.send:active{transform:scale(.95)}
.send:disabled{opacity:.3;cursor:default;transform:none;box-shadow:none}
.labels{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.lbl-chip{font-size:10.5px;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .12s}
.lbl-chip.on{color:#fff;border-color:transparent}
.lbl-chip:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.75)}
.tb-row{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.45);cursor:pointer;user-select:none}
.tb-row input{accent-color:#0070F3}
.tb-hint{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;line-height:1.5;font-family:'JetBrains Mono',monospace}
.divider{height:1px;background:rgba(255,255,255,.05);margin:4px 14px}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M12 3c.5 4 2.5 6 6.5 6.5-4 .5-6 2.5-6.5 6.5-.5-4-2.5-6-6.5-6.5C9.5 9 11.5 7 12 3z" fill="white"/>
    </svg>
  </div>
  <div class="hdr-text">
    <div class="hdr-title" id="team-name">StandSync</div>
    <div class="hdr-sub" id="progress">Loading...</div>
  </div>
</div>
<div class="bar-wrap"><div class="bar-fill" id="bar" style="width:0%"></div></div>
<div class="tasks" id="task-list">
  <div class="empty"><div class="empty-icon">⏳</div>Connecting to StandSync…</div>
</div>

<div class="add-form">
  <div class="add-row">
    <input type="text" id="inp" placeholder="Add a task…"/>
    <button class="send" id="send-btn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </div>
  <div class="add-row">
    <select id="assignee" style="display:none"></select>
    <select id="pri">
      <option value="medium">Medium</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="low">Low</option>
    </select>
    <select id="timeline">
      <option value="Today noon (12 PM)">Today noon</option>
      <option value="Today 3 PM">Today 3 PM</option>
      <option value="Today EOD (6 PM)" selected>Today EOD</option>
      <option value="Tomorrow morning">Tmr morning</option>
      <option value="Tomorrow EOD">Tmr EOD</option>
      <option value="This week">This week</option>
    </select>
  </div>
  <div class="add-row labels" id="labels"></div>
  <div class="add-row" style="flex-direction:column;align-items:flex-start;gap:4px">
    <label class="tb-row"><input type="checkbox" id="timeblock"/> Add to calendar</label>
    <div class="tb-hint" id="tb-hint" style="display:none"></div>
  </div>
</div>

<script>
var tasks=[],myEmail='',myName='',teamName='Team';
var isManager=false,members=[];
var selectedLabel=null;
var nextStatus={todo:'in-progress','in-progress':'done',done:'todo',blocked:'todo'};
var statusLabel={'in-progress':'In progress','done':'Done','blocked':'Blocked','todo':''};
var LABELS=[
  {id:'bug',label:'Bug',color:'#F87171'},
  {id:'feature',label:'Feature',color:'#3B9EFF'},
  {id:'urgent',label:'Urgent',color:'#FBBF24'},
  {id:'review',label:'Review',color:'#A78BFA'},
  {id:'design',label:'Design',color:'#F472B6'},
  {id:'research',label:'Research',color:'#22D3EE'},
  {id:'ops',label:'Ops',color:'#34D399'},
  {id:'docs',label:'Docs',color:'#94A3B8'}
];

function buildLabels(){
  var wrap=document.getElementById('labels');wrap.innerHTML='';
  LABELS.forEach(function(L){
    var b=document.createElement('button');
    b.className='lbl-chip';b.textContent=L.label;b.dataset.id=L.id;
    b.onclick=function(){
      selectedLabel=selectedLabel===L.id?null:L.id;
      Array.prototype.forEach.call(wrap.children,function(ch){
        var on=ch.dataset.id===selectedLabel;
        var def=LABELS.find(function(x){return x.id===ch.dataset.id;});
        ch.classList.toggle('on',on);
        ch.style.background=on?def.color:'transparent';
        ch.style.borderColor=on?def.color:'rgba(255,255,255,.12)';
        ch.style.color=on?'#fff':'rgba(255,255,255,.5)';
      });
    };
    wrap.appendChild(b);
  });
}

function buildAssignee(){
  var sel=document.getElementById('assignee');
  if(isManager&&members.length){
    sel.style.display='';sel.innerHTML='';
    members.forEach(function(m){
      var o=document.createElement('option');o.value=m.email;o.textContent=m.name||m.email;sel.appendChild(o);
    });
    if(members.some(function(m){return m.email===myEmail;}))sel.value=myEmail;
  } else {sel.style.display='none';}
}

function render(){
  var visible=isManager?tasks:tasks.filter(function(t){return t.assignee_email===myEmail;});
  var done=tasks.filter(function(t){return t.status==='done';}).length;
  var pct=tasks.length?Math.round(done/tasks.length*100):0;
  document.getElementById('team-name').textContent=teamName;
  document.getElementById('progress').textContent=done+'/'+tasks.length+' done · '+pct+'%';
  document.getElementById('bar').style.width=pct+'%';
  var html='';
  if(!visible.length){
    html='<div class="empty"><div class="empty-icon">✦</div>No tasks yet.<br>Add one below.</div>';
  } else {
    visible.forEach(function(t){
      var cls=t.status==='done'?'done':t.status==='in-progress'?'inprog':t.status==='blocked'?'blocked':'';
      var priTag=t.priority?'<span class="tag '+t.priority+'">'+t.priority+'</span>':'';
      var dlTag=(t.timeline||t.due_label)?'<span class="tag deadline">'+(t.timeline||t.due_label)+'</span>':'';
      var stTag=statusLabel[t.status]?'<span class="tag status">'+statusLabel[t.status]+'</span>':'';
      var lbTag=t.label?'<span class="tag label" style="background:'+(t.label_color||'#3B9EFF')+'">'+t.label+'</span>':'';
      var whoTag=(isManager&&t.assignee_name&&t.assignee_email!==myEmail)?'<span class="tag who">'+(t.assignee_name||'').split(' ')[0]+'</span>':'';
      html+='<div class="task">'+
        '<button class="cb '+cls+'" data-id="'+t.id+'" data-next="'+(nextStatus[t.status]||'todo')+'"></button>'+
        '<div class="task-body">'+
          '<div class="task-title'+(t.status==='done'?' done':'')+'">'+(t.title||'').replace(/</g,'&lt;')+'</div>'+
          '<div class="task-meta">'+priTag+stTag+lbTag+dlTag+whoTag+'</div>'+
        '</div>'+
      '</div>';
    });
  }
  document.getElementById('task-list').innerHTML=html;
}

function updateTbHint(){
  var on=document.getElementById('timeblock').checked;
  var hint=document.getElementById('tb-hint');
  if(on){hint.style.display='';hint.textContent='Timeline: '+document.getElementById('timeline').value;}
  else{hint.style.display='none';}
}

document.addEventListener('click',function(e){
  if(e.target.classList.contains('cb')){
    var id=e.target.dataset.id,next=e.target.dataset.next;
    if(window.opener)window.opener.postMessage({type:'status',id:id,status:next},'*');
    tasks=tasks.map(function(t){return t.id===id?Object.assign({},t,{status:next}):t;});
    render();
  }
});

var inp=document.getElementById('inp'),sendBtn=document.getElementById('send-btn');
inp.addEventListener('input',function(){sendBtn.disabled=!inp.value.trim();});
inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&inp.value.trim())send();});
sendBtn.addEventListener('click',send);
document.getElementById('timeblock').addEventListener('change',updateTbHint);
document.getElementById('timeline').addEventListener('change',updateTbHint);

function send(){
  var v=inp.value.trim();if(!v)return;
  var pri=document.getElementById('pri').value||'medium';
  var timeline=document.getElementById('timeline').value||'Today EOD (6 PM)';
  var addTimeBlock=document.getElementById('timeblock').checked;
  var assignEmail=myEmail,assignName=myName;
  if(isManager){var sel=document.getElementById('assignee');if(sel&&sel.value){assignEmail=sel.value;var mm=members.find(function(m){return m.email===sel.value;});assignName=mm?(mm.name||mm.email):sel.value;}}
  var task={id:'tmp'+Date.now(),title:v,status:'todo',priority:pri,timeline:timeline,due_label:timeline,assignee_email:assignEmail,assignee_name:assignName,addTimeBlock:addTimeBlock};
  if(selectedLabel){var L=LABELS.find(function(x){return x.id===selectedLabel;});if(L){task.label=L.label;task.label_color=L.color;}}
  if(window.opener)window.opener.postMessage({type:'addTask',task:task},'*');
  tasks.push(task);render();
  inp.value='';sendBtn.disabled=true;
  document.getElementById('pri').value='medium';
  document.getElementById('timeline').value='Today EOD (6 PM)';
  document.getElementById('timeblock').checked=false;
  selectedLabel=null;buildLabels();updateTbHint();
}

window.addEventListener('message',function(e){
  if(!e.data)return;
  if(e.data.type==='init'){
    tasks=e.data.tasks||[];myEmail=e.data.myEmail||'';myName=e.data.myName||'';teamName=e.data.teamName||'Team';
    isManager=!!e.data.isManager;members=e.data.members||[];
    if(e.data.timelineOptions&&e.data.timelineOptions.length){
      var tl=document.getElementById('timeline');tl.innerHTML='';
      e.data.timelineOptions.forEach(function(opt){
        var o=document.createElement('option');o.value=opt;o.textContent=opt.length>18?opt.replace('Today ','').replace('Tomorrow ','Tmr '):opt;
        if(opt.indexOf('EOD')>-1&&opt.indexOf('Today')>-1)o.selected=true;
        tl.appendChild(o);
      });
    }
    buildAssignee();buildLabels();updateTbHint();render();
  }
  if(e.data.type==='tasks'){tasks=e.data.tasks||[];render();}
});
</script>
</body>
</html>
